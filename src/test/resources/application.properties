# application.properties
# Configura\u00e7\u00e3o da API

# URL Base da API
api.base.url=https://api.example.com

# Vers\u00e3o da API
api.version=v1

# Timeouts (em ms)
request.timeout=5000

# Logging
enable.logging=true
log.level=INFO

# Autentica\u00e7\u00e3o (se necess\u00e1rio)
auth.type=bearer
auth.token=seu-token-aqui
